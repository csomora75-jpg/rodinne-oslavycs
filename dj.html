<!DOCTYPE html>
<html lang="sk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ Panel Rodinné OslavyCS</title>

<style>

body {
  background:#000;
  color:#d4af37;
  font-family:Arial,sans-serif;
  text-align:center;
}

h1 {
  font-size:32px;
}

.card {
  background:#111;
  margin:15px auto;
  padding:20px;
  border-radius:15px;
  max-width:450px;
}

button {
  background:#d4af37;
  color:#000;
  border:0;
  padding:14px;
  margin:5px;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  width:90%;
}

</style>

</head>


<body>

<h1>🎧 DJ Panel<br>Rodinné OslavyCS</h1>

<div id="songList"></div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyBhsdE4X-bCRslQmx-2I4Fp3lbXffGy3GM",
  authDomain: "rodinne-oslavycs.firebaseapp.com",
  databaseURL: "https://rodinne-oslavycs-default-rtdb.firebaseio.com",
  projectId: "rodinne-oslavycs",
  storageBucket: "rodinne-oslavycs.firebasestorage.app",
  messagingSenderId: "222862508260",
  appId: "1:222862508260:web:dfaf0baccb068ddcf42cf1"
};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const list = document.getElementById("songList");


onValue(ref(db, "songs"), (snapshot) => {

  list.innerHTML = "";

  snapshot.forEach((child) => {

    const data = child.val();

    list.innerHTML += `
    
    <div class="card">

      🎤 ${data.artist}<br>
      🎵 ${data.song}<br>
      👤 ${data.name || "Hosť"}

      <br><br>

      <button onclick="playYoutube('${data.artist}','${data.song}')">
      ▶️ YouTube
      </button>

    </div>

    `;

  });

});


window.playYoutube = function(artist, song){

 const search =
 encodeURIComponent(artist + " " + song);

 window.open(
 "https://www.youtube.com/results?search_query=" + search,
 "_blank"
 );

}


</script>
  

</body>

</html>
