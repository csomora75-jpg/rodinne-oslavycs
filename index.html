<!DOCTYPE html>
<html lang="sk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rodinné OslavyCS</title>

<style>

body{
background:radial-gradient(circle,#222,#000);
color:#d4af37;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
padding:20px;
}

h1{
font-size:32px;
}

input,button{

width:90%;
max-width:400px;

padding:15px;
margin:8px;

border-radius:12px;

border:0;

font-size:18px;

}


input{
background:white;
}


button{

background:#d4af37;

color:black;

font-weight:bold;

}


.card{

background:#111;

max-width:450px;

margin:15px auto;

padding:20px;

border-radius:15px;

box-shadow:0 0 15px #d4af37;

}


.now{

border:2px solid #d4af37;

font-size:20px;

}


</style>


</head>



<body>


<div class="container">


<h1>
🎵 Rodinné OslavyCS 🎵
</h1>


<p>
Pošli svoju obľúbenú skladbu DJ-ovi
</p>



<input id="artist" placeholder="Interpret">


<input id="song" placeholder="Názov piesne">


<input id="name" placeholder="Tvoje meno (voliteľné)">



<button id="addSong">
🎶 Poslať želanie
</button>



<div class="card now">

<h2>
🎧 Teraz hrá
</h2>

<p id="nowPlaying">
Čakám na hudbu...
</p>

</div>



<div class="card">

<h2>
✅ Stav
</h2>

<p id="status">
Pripravené
</p>

</div>



</div>



<script type="module">


import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import { getDatabase, ref, push, set, onValue }

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";





const firebaseConfig = {


apiKey:"AIzaSyBhsdE4X-bCRslQmx-2I4Fp3lbXffGy3GM",

authDomain:"rodinne-oslavycs.firebaseapp.com",

databaseURL:"https://rodinne-oslavycs-default-rtdb.firebaseio.com",

projectId:"rodinne-oslavycs",

storageBucket:"rodinne-oslavycs.firebasestorage.app",

messagingSenderId:"222862508260",

appId:"1:222862508260:web:dfaf0baccb068ddcf42cf1"


};



const app=initializeApp(firebaseConfig);


const db=getDatabase(app);




document
.getElementById("addSong")
.onclick=()=>{


let artist=document.getElementById("artist").value.trim();

let song=document.getElementById("song").value.trim();

let name=document.getElementById("name").value.trim();



if(!artist || !song){

alert("Vyplň interpreta a názov piesne.");

return;

}



let newSong=push(ref(db,"songs"));



set(newSong,{

artist:artist,

song:song,

name:name || "Hosť",

played:false,

time:Date.now()

});




document.getElementById("artist").value="";

document.getElementById("song").value="";

document.getElementById("name").value="";



document.getElementById("status").innerHTML=

"✅ Želanie odoslané DJ-ovi";


};






// zobraz aktuálnu skladbu


onValue(ref(db,"nowPlaying"),snap=>{


let data=snap.val();


if(data){


document.getElementById("nowPlaying").innerHTML=

`
🎵 <b>${data.artist}</b><br>
${data.song}
`;

}


});



</script>


</body>

</html>
