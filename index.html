<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rodinné OslavyCS</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #d4af37;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 32px;
}

h2 {
  margin-top: 30px;
}

input, button {
  width: 90%;
  max-width: 400px;
  padding: 15px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
}

input {
  background: white;
}

button {
  background: #d4af37;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.card {
  background: #111;
  margin: 15px auto;
  padding: 20px;
  border-radius: 12px;
  max-width: 450px;
}

.now {
  border: 2px solid #d4af37;
}

</style>

</head>

<body>

<div class="container">

<h1>🎵 Rodinné OslavyCS 🎵</h1>

<p>Pošli svoju obľúbenú pesničku</p>


<input id="artist" placeholder="Interpret">

<input id="song" placeholder="Názov piesne">

<input id="name" placeholder="Tvoje meno (voliteľné)">


<button id="addSong">
Pridať želanie
</button>


<div class="card now">

<h2>🎧 Teraz hrá</h2>

<p id="nowPlaying">
Nič nehrá
</p>

</div>


<h2>🎶 Želania hostí</h2>


<div id="songList"></div>


</div>
<script>



</script>

</body>

<script>

const addSong = document.getElementById("addSong");
const songList = document.getElementById("songList");
const nowPlaying = document.getElementById("nowPlaying");

let songs = [];

addSong.addEventListener("click", () => {

    const artist = document.getElementById("artist").value.trim();
    const song = document.getElementById("song").value.trim();
    const name = document.getElementById("name").value.trim();

    if (artist === "" || song === "") {
        alert("Vyplň interpreta aj názov piesne.");
        return;
    }

    songs.push({
        artist,
        song,
        name
    });

    document.getElementById("artist").value = "";
    document.getElementById("song").value = "";
    document.getElementById("name").value = "";

    renderSongs();
});

function renderSongs() {

    songList.innerHTML = "";

    songs.forEach((item, index) => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${item.artist}</h3>
            <p>${item.song}</p>
            <small>${item.name ? "Želá si: " + item.name : ""}</small>
            <br><br>
            <button onclick="playSong(${index})">
                Prehrať
            </button>
        `;

        songList.appendChild(div);

    });

}

function playSong(index) {

    const item = songs[index];

    nowPlaying.innerHTML =
        "🎵 " + item.artist + " – " + item.song;

    songs.splice(index, 1);

    renderSongs();

}

</script>

</body>
</html>

  
</html>
