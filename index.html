<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodinné OslavyCS</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #d4af37;
  text-align: center;
}

.container {
  padding: 25px;
}

h1 {
  font-size: 32px;
}

input, button {
  width: 90%;
  max-width: 400px;
  padding: 15px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
}

input {
  background: white;
}

button {
  background: #d4af37;
  color: black;
  font-weight: bold;
}

.card {
  background: #111;
  margin: 10px auto;
  padding: 15px;
  border-radius: 12px;
  max-width: 450px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎵 Rodinné OslavyCS 🎵</h1>

<p>Pošli svoju obľúbenú pesničku</p>

<input id="artist" placeholder="Interpret">
<input id="song" placeholder="Názov piesne">
<input id="name" placeholder="Tvoje meno (voliteľné)">

<button>Pridať želanie</button>

<h2>🎶 Želania hostí</h2>

<div class="card">
Zoznam skladieb sa načíta po pripojení databázy.
</div>

</div>

</body>
</html>
